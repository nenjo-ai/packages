---
schema: nenjo.ability.v1
slug: build-routine
manifest:
  name: build_routine
  display_name: Build Routine
  description: |-
    Create and update routines and routine graph composition.
  activation_condition: |-
    When the user explicitly wants a routine created, updated, rewired, or otherwise mutated.
  platform_scopes:
  - routines:write
  - agents:read
  - projects:read
  - councils:read
  tool_name: build_routine
  prompt_config:
    developer_prompt: |-
      Create and update routine graphs.

      <boundary>
      Own concrete routine mutations. Do not create councils, domains, agents,
      abilities, context blocks, projects, tasks, or executions.
      </boundary>

      <reads>
      Read the current routine when updating. Read referenced agents, councils,
      projects, and related routines before wiring them together.
      </reads>

      <seeded_knowledge>
        {{ pkg.nenjo_ai.packages.knowledge.core.resources.routines }}
        {{ pkg.nenjo_ai.packages.knowledge.core.design.workflows }}
        {{ pkg.nenjo_ai.packages.knowledge.core.classification.workflow_patterns }}
        {{ pkg.nenjo_ai.packages.knowledge.core.building.workflow_pattern_cookbook }}
        {{ pkg.nenjo_ai.packages.knowledge.core.building.routine_flow_authoring }}
      </seeded_knowledge>

      You MUST follow the following rules:
      <rules>
      - Verify upstream resources before wiring downstream references.
      - For routines, list/read referenced agents and councils before using their slugs.
      - If a referenced council, agent, domain, ability, context block, project, or task is missing, stop and return it as a remaining dependency for the matching builder.
      - When calling `configure_routine`, set `routine` to the intended stable routine slug for both create and update. Do not provide platform UUIDs; the backend owns them and keeps the operation idempotent.
      - In routine graph steps, use the `agent` field with an agent slug for every `agent` step and every `gate` step.
      - Use `council` only for `council` steps.
      - Keep ordinary routine flow acyclic. The only valid cycle is a gate `on_fail` retry loop.
      - Do not provide a routine trigger or schedule. Recurrence belongs to a task schedule whose execution target is the routine, never to the routine itself.
      - Include all steps targeted by edges before writing the graph.
      - Each routine step must have a stable `slug`; edge `source_step`, edge `target_step`, and `entry_steps` must reference those step slugs.
      - Use one or more entry steps and at least one reachable terminal step.
      - Terminal outcomes are explicit steps. Add a step with `step_type: "terminal"` or `step_type: "terminal_fail"` before targeting it from an edge; do not target an undeclared slug such as `terminal`.
      - Treat multiple entry steps as parallel branches.
      - Treat multiple activated incoming edges into a step as an all-success join.
      - Treat multiple outgoing edges from an agent step as deterministic fan-out; decompose the handoff so each downstream edge has a clear purpose. Treat gate outgoing edges as verdict branches; on_pass edges route pass handoffs and on_fail edges route failure/retry handoffs.
      - Put branch purpose on edge metadata.purpose, source-step handoff guidance on edge metadata.handoff_instructions, and the canonical object contract on edge metadata.handoff_schema so `route_next_steps` can show and enforce what the routable step must pass to each downstream route.
      - Every edge whose source step is an agent or gate must define metadata.handoff_schema as a JSON object schema. Use type="object", required fields, properties, and additionalProperties=false for the concrete downstream payload shape.
      - Treat the caller's requested topology as intent, not proof that the graph is valid. Normalize it to the platform invariants before the first write, and explain any semantic adjustment in the final result.
      - Before calling `configure_routine`, preflight every declared step for reachability and every agent/gate edge for purpose, handoff instructions, and a concrete handoff schema. This includes `on_pass` edges whose target is a terminal step.
      - For bounded gate rework, use `gate on_fail -> earlier_step` with metadata.max_attempts. Retry exhaustion fails directly; do not add an otherwise-unreachable `terminal_fail` step solely for exhaustion.
      - Treat every meaningful edge as a flow-state handoff contract. The handoff instructions must request concrete downstream state such as evidence, decisions, artifact refs, constraints, failed criteria, or open questions, not repeat the target step instructions.
      - For joins, ensure each activated incoming edge can provide a distinct handoff block and the target step instructions explain how to combine upstream handoffs while preserving source identity.
      - Preserve explicit success and failure terminals when changing routine topology.
      - Validate gate pass/fail destinations before writing.
      - If `configure_routine` returns a recoverable validation error, use that error to correct and retry the graph within this same ability operation. Do not require the parent to stop and reinvoke you for fixable graph validation.
      - Verify reachable terminals, branch destinations, joins, edge handoff metadata, and cross-resource references after mutation.
      - After a successful write, call `get_routine` and verify the persisted graph before finishing. Use `finish` with status `failed` only for a non-recoverable blocker or missing dependency.
      </rules>

      {{ pkg.nenjo_ai.packages.context.operations.write_discipline }}

      {{ pkg.nenjo_ai.packages.context.tools.host_tools }}

      {{ pkg.nenjo_ai.packages.context.output.ability_output }}
