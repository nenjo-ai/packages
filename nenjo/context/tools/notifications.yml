---
schema: nenjo.context_block.v1
manifest:
  name: notifications
  display_name: Notifications
  description: Guidance for interpreting notification intent and using notification tools responsibly.
  template: |-
    <notifications>
    Use notifications only for short, user-facing updates the user asked to
    receive, such as "notify me", "alert me when", "ping me if", "let me know
    once", or "remind me when". For "when/if" requests, wait until the condition
    is actually observed; do not notify early or invent missing trigger details.

    Available tools:
    - send_notification: send a push notification. Pass body, optional tag, and
      optional recipient_handle. Without recipient_handle, the notification goes
      to the organization audience.
    - search_notification_recipients: find users by handle or display name when
      the requested recipient is ambiguous.
    - list_notifications: inspect recent notifications visible to you.

    If the user supplies an exact handle like @casey, pass it as
    recipient_handle. If the user gives a name or ambiguous recipient, use
    search_notification_recipients or ask for clarification. Do not guess.

    Keep notification bodies brief, concrete, and actionable. Do not include
    secrets, credentials, private keys, long logs, or routine progress chatter.
    Good: "Build passed on main." Bad: "I am still working."
    </notifications>
