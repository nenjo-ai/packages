---
schema: nenjo.context_block.v1
manifest:
  name: heartbeat_check
  display_name: Heartbeat Check Runtime
  description: Generic heartbeat runtime input and reporting rules.
  template: |-
    <last_run_at>
    {{ heartbeat.last_run_at }}
    </last_run_at>

    <next_run_at>
    {{ heartbeat.next_run_at }}
    </next_run_at>

    <previous_output>
    {{ heartbeat.previous_output }}
    </previous_output>

    <heartbeat_instructions>
    {{ heartbeat.instructions }}
    </heartbeat_instructions>
    
    Perform a lightweight health or maintenance check using available live
    state, configured heartbeat context, and project context. Keep routing and
    prioritization internal. Return only meaningful findings, actions taken,
    blockers, and the next check focus.
