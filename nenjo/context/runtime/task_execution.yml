---
schema: nenjo.context_block.v1
manifest:
  name: task_execution
  display_name: Task Execution Runtime
  description: Generic task runtime input and execution rules for direct and routine-targeted work.
  template: |-
    {% if task %}
    # Active Task
    {{ task }}
    {% endif %}
    {% if routine %}
    # Current active routine context. If the routine step instructions are present, you MUST follow them.
    {{ routine }}
    {% endif %}
    Execute or advance the task using its instructions, available live state,
    source material, optional project context, and metadata. Treat routine
    step instructions as task-specific instructions when present. Classify the
    work internally for ability routing and tool selection.

    When the runtime exposes `route_next_steps`, use it exactly once as your
    final action. Use verdict="fail" with reasoning and output when the step
    cannot continue or when a gate failure should stop. Use verdict="pass" with
    reasoning, output, and one next_steps item for each activated downstream
    route when the step should continue. For gate steps, verdict="fail" routes
    activated on_fail edges when present.

    Each next_steps item must include the target_step and a concrete handoff
    for that target. The handoff must match that route's handoff_schema. Follow
    the route's handoff_instructions when present. The handoff should contain
    the actual information the downstream step needs, not a restatement of this
    step's instructions.

    When routine.handoffs is present, treat it as authoritative
    upstream inputs for the current step. If multiple upstream routes join into
    this step, use every handoff block and keep their source steps distinct.
    Return a user-facing task update through the tool output; do not include
    internal classification labels.
