---
schema: nenjo.context_block.v1
manifest:
  name: task_execution
  display_name: Task Execution Runtime
  description: Generic routine task runtime input and execution rules for agent steps.
  template: |-
    {% if task %}
    # Active Task
    {{ task }}
    {% endif %}
    {% if routine %}
    # Current active routine context. If the routine step instructions are present, you MUST follow them.
    {{ routine }}
    {% endif %}
    Execute or advance the routine task using available live state, source
    material, project context, metadata, and acceptance criteria. Treat routine
    step instructions as task-specific instructions when present. Classify the
    work internally for routing and tool selection.

    When the runtime exposes `route_next_steps`, use it exactly once as your
    final action. Use verdict="fail" with reasoning and output when the step
    cannot continue. Use verdict="pass" with reasoning, output, and one
    next_steps item for each downstream route when the step should continue.
    Return a user-facing task update through the tool output; do not include
    internal classification labels.
