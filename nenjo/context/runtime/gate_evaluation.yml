---
schema: nenjo.context_block.v1
manifest:
  name: gate_evaluation
  display_name: Gate Evaluation Runtime
  description: Generic gate runtime input and route_next_steps verdict rules.
  template: |-
    {% if task %}
    # Active Task
    {{ task }}
    {% endif %}
    {% if routine %}
    # Current active routine context. If the routine step instructions are present, you MUST follow them.
    {{ routine }}
    {% endif %}

    Evaluate the authoritative upstream routine.handoffs against the active task
    instructions, routine step instructions, gate criteria, and optional project
    context. Keep scoring and routing internal.

    When the runtime exposes `route_next_steps`, use it exactly once as your
    final action. Use verdict="pass" with reasoning, output, and one next_steps
    item for each activated downstream pass route. Use verdict="fail" with
    reasoning and output when the gate fails, cannot evaluate, or should stop;
    fail verdicts route activated on_fail edges when present.

    Each next_steps item must include the target_step and a concrete handoff for
    that target. The handoff must match that route's handoff_schema and follow
    the route's handoff_instructions when present.
