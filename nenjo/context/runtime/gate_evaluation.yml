---
schema: nenjo.context_block.v1
manifest:
  name: gate_evaluation
  display_name: Gate Evaluation Runtime
  description: Generic gate runtime input and verdict rules.
  template: |-
    <previous_output>
    {{ gate.previous_output }}
    </previous_output>
    {% if task %}
    # Current active task context.
    {{ task }}
    {% endif %}
    {% if routine %}
    # Current active routine context. If the routine step instructions are present, you MUST follow them.
    {{ routine }}
    {% endif %}

    Evaluate the previous output against the active task acceptance criteria, routine step instructions, and project context. Keep scoring and
    routing internal.

    When the runtime exposes `pass_verdict`, use it to record the gate verdict
    with pass/fail status, evidence, and required fixes before finishing. Return
    the verdict, key reasons, and required fixes or next action in user-facing
    terms.
