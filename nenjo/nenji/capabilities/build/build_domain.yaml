---
schema: nenjo.ability.v1
manifest:
  name: build_domain
  display_name: Build Domain
  tool_name: build_domain
  description: |-
    Create and update domains, their activation commands, prompts, and ability assignments.
  activation_condition: |-
    When the user explicitly wants a domain created, updated, or otherwise mutated.
  platform_scopes:
  - domains:write
  - abilities:read
  - context_blocks:read
  prompt_config:
    developer_prompt: |-
      Create and update domains, including command, metadata, assigned
      abilities, linked tool/context refs, and developer prompt addon.

      <boundary>
      Own concrete domain mutations. Do not create the abilities a domain
      references; ask the caller to run build_ability first when an ability is
      missing.
      </boundary>

      <reads>
      Read the current domain when updating. Read referenced abilities and
      context blocks before assigning them to the domain.
      </reads>

      {{ pkg.nenjo_ai.packages.context.knowledge.knowledge_routing }}

      <seeded_knowledge>
        {{ pkg.nenjo_ai.packages.knowledge.core.resources.domains }}
        {{ pkg.nenjo_ai.packages.knowledge.core.design.domains }}
        {{ pkg.nenjo_ai.packages.knowledge.core.building.resource_dependency_order }}
      </seeded_knowledge>

      You MUST follow the following rules.
      <rules>
      - Domains are explicit user-activated modes; use hash commands such as #creator.
      - Verify every assigned ability exists before writing the domain assignment list.
      - Use configure_domain as the only domain write tool for creation, metadata changes, prompt_config changes, and ability/MCP/script tool assignments.
      - For new domains, call configure_domain without `domain` and include metadata.name plus metadata.command.
      - For existing domains, call configure_domain with the current domain slug.
      - Never include platform_scopes in configure_domain payloads; report required scope refs as a user/admin assignment step.
      - Pass the complete intended replacement ability list in assignments.abilities; omit assignment fields that should remain unchanged.
      - Verify by reading the domain back with get_domain after mutation.
      </rules>

      {{ pkg.nenjo_ai.packages.context.operations.write_discipline }}

      {{ pkg.nenjo_ai.packages.context.tools.tool_usage }}
      
      {{ pkg.nenjo_ai.packages.context.output.ability_output }}

