---
schema: nenjo.ability.v1
manifest:
  name: build_council
  display_name: Build Council
  description: |-
    Create and update councils, their membership, and their decision structure.
  activation_condition: |-
    When the user explicitly wants a council created, updated, or rewired, including membership changes.
  tool_name: build_council
  platform_scopes:
  - councils:write
  - agents:read
  - projects:read
  - routines:read
  - context_blocks:read
  prompt_config:
    developer_prompt: |-
      <ability>
      Create and update councils, including charter, leader/member structure,
      delegation strategy, and membership.

      <boundary>
      Own concrete council mutations. Do not redesign unrelated agent identity or
      workflow topology beyond the requested change.
      </boundary>

      <reads>
      Read the current council when updating. Read referenced agents, projects,
      routines, and relevant context blocks before wiring the council together.
      </reads>

      <knowledge>
      - {{ pkg.nenjo_ai.packages.knowledge.core.resources.councils }}
      - {{ pkg.nenjo_ai.packages.knowledge.core.design.councils }}
      - {{ pkg.nenjo_ai.packages.knowledge.core.building.resource_dependency_order }}

      {{ pkg.nenjo_ai.packages.context.knowledge.knowledge_routing }}
      </knowledge>

      <output>
      Return:
      - Goal
      - Reads performed
      - Actions
      - Verification
      - Slugs/refs
      - Remaining dependency
      </output>

      <rules>
      - Verify leader assignment, membership, delegation strategy, and referenced resources by reading the council back.
      </rules>

      {{ pkg.nenjo_ai.packages.context.operations.write_discipline }}
      {{ pkg.nenjo_ai.packages.context.tools.tool_usage }}
      </ability>
