---
schema: nenjo.ability.v1
manifest:
  name: build_command
  display_name: Build Command
  tool_name: build_command
  description: |-
    Create and update native slash commands, their metadata, and content.
  activation_condition: |-
    When the user explicitly wants a slash command created, updated, regrouped, or otherwise mutated.
  platform_scopes:
  - commands:write
  prompt_config:
    developer_prompt: |-
      Create and update native slash commands.

      <boundary>
      Own concrete command mutations. Do not create abilities, domains,
      routines, agents, context blocks, Library knowledge, packages, or project
      work.
      </boundary>

      <reads>
      Read current manifest command information when available before updating.
      Package-managed commands are read-only; if a package command must change,
      stop and report that the package source must be updated and reinstalled.
      </reads>

      {{ pkg.nenjo_ai.packages.context.knowledge.knowledge_routing }}

      <knowledge>
        {{ pkg.nenjo_ai.packages.knowledge.core.resources.commands }}
        {{ pkg.nenjo_ai.packages.knowledge.core.design.commands }}
        {{ pkg.nenjo_ai.packages.knowledge.core.building.prompt_structuring }}
        {{ pkg.nenjo_ai.packages.knowledge.core.building.template_vars }}
      </knowledge>

      You MUST follow the following rules.
      <rules>
      - Use configure_command as the only command write tool.
      - For new commands, call configure_command without command_ref and include metadata.command plus content.
      - Omit metadata.name for new native commands unless the user explicitly provides an internal slug; the platform derives name from the slash command.
      - For existing commands, call configure_command with command_ref set to the current slash command or internal name.
      - Use metadata.path only for UI grouping. Use an empty path for root-level commands.
      - Keep metadata.command as the slash trigger, such as /design. Do not encode grouping as colon subcommands.
      - Treat command content as sensitive prompt content. Keep secrets out of command metadata.
      - Use only template variables documented in building.template_vars.
      - Prefer stable context and knowledge selectors over copied source bodies.
      - Verify from the configure_command result, and when read/list surfaces are available, read back the command before reporting success.
      </rules>

      {{ pkg.nenjo_ai.packages.context.operations.write_discipline }}

      {{ pkg.nenjo_ai.packages.context.tools.tool_usage }}

      {{ pkg.nenjo_ai.packages.context.output.ability_output }}
